<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サポート｜タイムバケット</title>
<style>
  :root { --bg:#F5F3EF; --accent:#B08850; --text:#3A3227; --soft:#7C7263; --line:#E8E2D6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif; line-height:1.8; }
  header { padding:48px 20px 24px; text-align:center; }
  .logo { font-size:40px; }
  h1 { font-size:22px; margin:12px 0 4px; }
  main { max-width:680px; margin:0 auto; padding:0 24px 80px; }
  .card { background:#fff; border-radius:20px; padding:32px 28px; box-shadow:0 8px 24px rgba(58,50,39,.06); margin-bottom:20px; }
  h2 { font-size:17px; margin:0 0 12px; }
  p, li { font-size:15px; }
  dt { font-weight:600; margin-top:16px; }
  dd { margin:4px 0 0; color:var(--soft); }
  a { color:var(--accent); }
  .btn { display:inline-block; background:var(--accent); color:#fff; text-decoration:none;
    padding:12px 28px; border-radius:24px; font-size:15px; }
  footer { text-align:center; padding:24px; color:var(--soft); font-size:13px; }
</style>
</head>
<body>
<header>
  <div class="logo">🪣</div>
  <h1>タイムバケット サポート</h1>
</header>
<main>
  <div class="card">
    <h2>よくある質問</h2>
    <dl>
      <dt>Q. タイムバケットとは何ですか？</dt>
      <dd>「死ぬまでにやりたいこと」を年代ごとのバケツ（期間）に入れて整理する考え方です。本アプリはそのリスト作りをお手伝いします。</dd>
      <dt>Q. データはどこに保存されますか？</dt>
      <dd>すべて端末内に保存されます。外部への送信はありません。詳しくは<a href="index.html">プライバシーポリシー</a>をご覧ください。</dd>
      <dt>Q. 機種変更のときデータは引き継げますか？</dt>
      <dd>現在のバージョンでは端末間の引き継ぎ機能は準備中です。アップデートをお待ちください。</dd>
    </dl>
  </div>
  <div class="card" style="text-align:center;">
    <h2>お問い合わせ</h2>
    <p>解決しない場合は、メールでお気軽にご連絡ください。</p>
    <a class="btn" href="mailto:atm.atmlog@gmail.com?subject=【タイムバケット】お問い合わせ">メールで問い合わせる</a>
  </div>
</main>
<footer>© 2026 atm</footer>
</body>
</html>
